version: '3.8'

services:
  #Postgres database
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: hospital_readmissions
      POSTGRES_USER: ml_user
      POSTGRES_PASSWORD: ml_password_123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ml_user -d hospital_readmissions"]
      interval: 10s
      timeout: 5s
      retries: 5

  mlflow:
    image: python:3.11-slim
    command: >
      bash -c "pip install mlflow psycopg2-binary && mlflow server --host 0.0.0.0 --port 5000
      --backend-store-uri sqlite:///mlflow.db --default-artifact-root /mlflow/artifacts
      "
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow
    depends_on:
      - postgres

  api:
    build:
      context: "."
      dockerfile: "Dockerfile"
    ports:
      - "8000:8000"
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=hospital_readmissions
      - POSTGRES_USER=ml_user
      - POSTGRES_PASSWORD=ml_password_123
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./data/processed:/app/data/processed

  # airflow webserver
  airflow:
    image: apache/airflow:2.8.1-python3.11
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=sqlite:////opt/airflow/airflow.db
      - AIRFLOW__CORE__LOAD_EXAMPLES=false
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./src:/opt/airflow/src
      - ./data:/opt/airflow/data
    ports:
      - "8080:8080"
    command: >
      bash -c "airflow db init &&
               airflow users create --username admin --password admin123
               --firstname Admin --lastname User --role Admin --email admin@example.com &&
               airflow webserver --port 8080"
    depends_on:
      - postgres

  # airflow scheduler
  airflow-scheduler:
    image: apache/airflow:2.8.1-python3.11
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=sqlite:////opt/airflow/airflow.db
      - AIRFLOW__CORE__LOAD_EXAMPLES=false
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./src:/opt/airflow/src
      - ./data:/opt/airflow/data
    command: airflow scheduler
    depends_on:
      - airflow

volumes:
  postgres_data:
  mlflow_data:

